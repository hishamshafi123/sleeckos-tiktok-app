# nginx server block for the sleeckos TikTok app.
#
# Replace every occurrence of "example.com" with your actual domain before use.
# Quick replace:
#   sed 's/example\.com/yourdomain.com/g' example.com.conf > yourdomain.com.conf
#
# After editing:
#   sudo cp deploy/nginx/yourdomain.com.conf /etc/nginx/sites-available/yourdomain.com
#   sudo ln -s /etc/nginx/sites-available/yourdomain.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d example.com -d www.example.com

# Redirect plain HTTP → HTTPS (certbot will manage this block after issuance).
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    return 301 https://$host$request_uri;
}

# HTTPS — certbot will append ssl_certificate / ssl_certificate_key directives.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name example.com www.example.com;

    # Certbot fills these in automatically with --nginx.
    # ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;

    # Allow reasonably large bodies (video metadata POSTs, JSON payloads).
    client_max_body_size 25m;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for WebSocket upgrades if ever added.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
